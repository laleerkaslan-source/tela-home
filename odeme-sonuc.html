<!DOCTYPE html>
<html lang="tr">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2JCWKJ63ZS"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-2JCWKJ63ZS');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödeme Sonucu | Tela Home</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header" id="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><img src="logo.svg" alt="Tela Home"></a>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav-link">Ana Sayfa</a>
        <a href="index.html#products" class="nav-link">Ürün Grupları</a>
      </nav>
      <div class="header-actions">
        <button class="hamburger" id="hamburger" aria-label="Menü"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <section class="checkout-page">
    <div class="container">
      <div class="checkout-wrapper">
        <div class="checkout-notice" id="resultBox">
          <div id="loadingState">
            <p style="font-size:1.1rem;color:var(--gray);">Ödeme sonucu kontrol ediliyor...</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand"><a href="index.html" class="logo"><img src="logo.svg" alt="Tela Home"></a><p>Kaliteli ve uygun fiyatlı ev tekstili.</p></div>
      <div class="footer-links"><h4>Menü</h4><a href="index.html">Ana Sayfa</a><a href="index.html#products">Ürün Grupları</a><a href="index.html#contact">İletişim</a></div>
      <div class="footer-contact"><h4>İletişim</h4><p>Ümitköy / Ankara</p><p><a href="tel:+905063977307">+90 506 397 73 07</a></p></div>
    </div>
    <div class="footer-bottom"><p>&copy; 2026 Tela Home. Tüm hakları saklıdır.</p></div>
  </footer>

  <script src="cart.js"></script>
  <script>
    document.getElementById('hamburger').addEventListener('click', function() {
      this.classList.toggle('active');
      document.getElementById('nav').classList.toggle('open');
    });

    const WORKER_URL = 'https://telahome-pay.laleerkaslan.workers.dev';

    async function checkPayment() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const box = document.getElementById('resultBox');

      if (!token) {
        box.innerHTML = `
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#e53935" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <h2>Ödeme bilgisi bulunamadı</h2>
          <p>Geçersiz veya eksik ödeme bilgisi.</p>
          <a href="index.html" class="btn btn-primary" style="width:100%;justify-content:center;">Ana Sayfaya Dön</a>
        `;
        return;
      }

      try {
        const res = await fetch(WORKER_URL + '/check-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        const data = await res.json();

        if (data.status === 'SUCCESS') {
          // Clear cart on success
          localStorage.removeItem('telaCart');
          Cart.updateCount();

          box.innerHTML = `
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="16 9 10.5 14.5 8 12"/></svg>
            <h2 style="color:var(--green-dark);">Ödemeniz Başarıyla Alındı!</h2>
            <p>Siparişiniz onaylandı. En kısa sürede kargoya verilecektir.</p>
            <div style="background:var(--bg);border-radius:8px;padding:16px;width:100%;text-align:left;font-size:0.9rem;">
              <p><strong>Ödeme ID:</strong> ${data.paymentId || '-'}</p>
              <p><strong>Tutar:</strong> ${data.paidPrice ? parseFloat(data.paidPrice).toLocaleString('tr-TR') + ' TL' : '-'}</p>
              ${data.installment && data.installment > 1 ? '<p><strong>Taksit:</strong> ' + data.installment + ' taksit</p>' : ''}
            </div>
            <a href="index.html" class="btn btn-primary" style="width:100%;justify-content:center;">Alışverişe Devam Et</a>
          `;
        } else {
          box.innerHTML = `
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#e53935" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <h2 style="color:#e53935;">Ödeme Başarısız</h2>
            <p>Ödemeniz tamamlanamadı. Lütfen tekrar deneyin veya farklı bir kart kullanın.</p>
            <a href="sepet.html" class="btn btn-primary" style="width:100%;justify-content:center;">Sepete Dön</a>
            <a href="index.html" class="btn btn-outline" style="width:100%;justify-content:center;">Ana Sayfaya Dön</a>
          `;
        }
      } catch (err) {
        box.innerHTML = `
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--brown)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <h2>Bağlantı Hatası</h2>
          <p>Ödeme durumu kontrol edilemedi. Lütfen daha sonra tekrar deneyin.</p>
          <a href="index.html" class="btn btn-primary" style="width:100%;justify-content:center;">Ana Sayfaya Dön</a>
        `;
      }
    }

    checkPayment();
  </script>
</body>
</html>
